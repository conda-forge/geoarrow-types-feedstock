{% set name = "geoarrow-types" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/geoarrow_types-{{ version }}.tar.gz
  sha256: 82243e4be88b268fa978ae5bba6c6680c3556735e795965b2fe3e6fbfea9f9ee

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0.0
    - setuptools-scm
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - geoarrow.types
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/geoarrow/geoarrow-python
  summary: Lightweight GeoArrow type specification
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - paleolimbot
